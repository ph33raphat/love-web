<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ถึงเธอ 💖</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 15px;
      background-color: red;
      color: white;
      cursor: pointer;
    }

    #text {
      margin-top: 20px;
      font-size: 28px;
    }
    #text2 {
      margin-top: 20px;
      font-size: 28px;
    }

    .heart {
      position: fixed;
      color: red;
      animation: float 3s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-800px); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>กดนี่สิที่รัก 💌</h1>
  <button onclick="showLove()">กดเลย เบบบบบบ</button>
  <div id="text"></div>
  <div id="text2"></div>

  <script>
    function showLove() {
      document.getElementById("text").innerHTML = "เค้ารักเบเบมากๆที่สุดในโลกเลยน้าาาาา มั๊วะๆๆๆ 💖";
      document.getElementById("text2").innerHTML = "เค้าทำแบบรีบๆ โทษที55555555 💖";

      setInterval(createHeart, 200);
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.fontSize = (Math.random() * 20 + 20) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3000);
    }
  </script>

</body>
</html>
